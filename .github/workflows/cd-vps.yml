name: CD - Deploy To VPS

on:
  workflow_run:
    workflows: ["CI - Build and Push Docker Image"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: false
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate deploy secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.VPS_MSSQL_SA_PASSWORD }}" ]; then
            echo "::error::Missing VPS_MSSQL_SA_PASSWORD secret"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ] || [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "::error::Missing DOCKERHUB_USERNAME or DOCKERHUB_TOKEN secret"
            exit 1
          fi

      - name: Upload deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "deploy/vps/*"
          target: "/opt/sieuthidienmay"
          strip_components: 2

      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/sieuthidienmay-web:${{ steps.vars.outputs.image_tag }}
          MSSQL_SA_PASSWORD: ${{ secrets.VPS_MSSQL_SA_PASSWORD }}
          DB_NAME: ${{ secrets.VPS_DB_NAME }}
          BACKUP_FILE: ${{ secrets.VPS_BACKUP_FILE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: IMAGE,MSSQL_SA_PASSWORD,DB_NAME,BACKUP_FILE,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -e
            mkdir -p /opt/sieuthidienmay
            cd /opt/sieuthidienmay

            DB_NAME_VALUE="${DB_NAME:-Web_dienmay}"
            BACKUP_FILE_VALUE="${BACKUP_FILE:-Web_dienmay}"

            printf "DOCKER_IMAGE=%s\nMSSQL_SA_PASSWORD=%s\nDB_NAME=%s\nBACKUP_FILE=%s\n" "${IMAGE}" "${MSSQL_SA_PASSWORD}" "${DB_NAME_VALUE}" "${BACKUP_FILE_VALUE}" > .env

            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d

            for i in $(seq 1 20); do
              if docker ps --format '{{.Names}}' | grep -q '^sieuthidienmay-web$'; then
                break
              fi
              sleep 3
            done

            if ! docker ps --format '{{.Names}}' | grep -q '^sieuthidienmay-web$'; then
              echo "Web container is not running after deploy"
              docker compose -f docker-compose.yml ps
              docker compose -f docker-compose.yml logs --tail 200 web
              exit 1
            fi

            if ! curl -fsS --max-time 15 http://localhost:8080/ >/dev/null; then
              echo "Web endpoint check failed: http://localhost:8080"
              docker compose -f docker-compose.yml logs --tail 200 web
              exit 1
            fi

            docker image prune -f
